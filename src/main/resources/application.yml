spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/student_hub
    username: root
    password: ""

  data:
    redis:
      host: localhost
      port: 6379
      database: 10

  mail:
    host: smtp.qq.com
    port: 587
    username: 2098963877@qq.com
    password: ""
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  # Spring AI
  ai:
    openai:
      api-key: ""
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        options:
          model: qwen-turbo
          temperature: 0.2
          max-tokens: 512

mybatis-plus:
  type-aliases-package: com.it.zwx.studenthub_system.pojo
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
    type-handlers-package: com.baomidou.mybatisplus.extension.handlers
  global-config:
    db-config:
      field-type-handler: com.baomidou.mybatisplus.extension.handlers.JacksonTypeHandler
      id-type: auto

pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true

studenthub:
  upload-dir: uploads